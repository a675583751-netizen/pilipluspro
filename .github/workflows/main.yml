name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Kotlin Plugin Issue
        run: |
          # 强力删除引起 AGP 9.0 冲突的旧版 Kotlin 插件声明
          find . -type f \( -name "*.gradle" -o -name "*.gradle.kts" \) -exec sed -i '/org.jetbrains.kotlin.android/d' {} +

      - name: Build APK (Show Real Logs)
        run: |
          # 1. 智能定位到包含 gradlew 的项目根目录
          WORK_DIR=$(dirname $(find . -name "gradlew" | head -n 1))
          echo "🚀 发现项目目录: $WORK_DIR"
          cd "$WORK_DIR"
          
          # 2. 赋予执行权限
          chmod +x ./gradlew
          
          # 3. 开始打包！如果失败会立刻红灯并输出详细原因
          ./gradlew assembleDebug --info --stacktrace

      - name: Collect and Upload APK
        if: always() # 无论成功失败，都尝试去抓取可能生成的 apk
        uses: actions/upload-artifact@v4
        with:
          name: PiliPlusFPS-Module
          path: "**/*.apk"
