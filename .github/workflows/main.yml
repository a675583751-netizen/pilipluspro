name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK
        run: |
          WORK_DIR=$(dirname $(find . -name "gradlew" | head -n 1))
          cd "$WORK_DIR"
          chmod +x ./gradlew
          ./gradlew assembleDebug --info --stacktrace

      - name: Collect and Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PiliPlusFPS-Module
          path: "**/*.apk"
