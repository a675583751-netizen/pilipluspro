name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Smart Build APK
        run: |
          # 1. 魔法指令：全盘搜索 gradle 配置文件，并自动删除引起报错的旧版 Kotlin 插件代码
          find . -name "*.gradle*" -exec sed -i '/org.jetbrains.kotlin.android/d' {} \;
          
          # 2. 赋予权限并打包
          find . -name "gradlew" -exec chmod +x {} \;
          find . -name "gradlew" -execdir ./gradlew assembleDebug \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PiliPlusFPS-Module
          path: "**/*.apk"
